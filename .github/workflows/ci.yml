name: ♾️ CI
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🧹 Lint
        run: npm run lint

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🔨 Build
        run: npm run build

      - name: 📄 Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: 📤 Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🔨 Build
        run: npm run build

      - name: 🛡️ Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: 🧪 Test
        run: npm test

  deploy:
    name: 🌐 Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
